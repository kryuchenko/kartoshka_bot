name: CI & Coverage

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

# нужно для пуша бейджа и комментариев в PR
permissions:
  contents: write
  pull-requests: write

jobs:
  tests:
    runs-on: ubuntu-latest

    steps:
    # 1. Клонируем код
    - uses: actions/checkout@v6

    # 2. Ставим Python
    - name: Set up Python
      uses: actions/setup-python@v6
      with:
        python-version: '3.10'

    # 3. Зависимости
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
        pip install pytest pytest-asyncio pytest-cov

    # 4. Переменные окружения, которые нужны тестам
    - name: Prepare runtime env vars
      run: |
        echo "BOT_TOKEN=123456789:TEST_TOKEN_FOR_TESTING" >> $GITHUB_ENV
        echo "EDITOR_IDS=123,456,789" >> $GITHUB_ENV
        echo "PUBLISH_CHAT_ID=-1001234567890" >> $GITHUB_ENV
        echo "BOT_NAME=TestBot" >> $GITHUB_ENV
        echo "POST_FREQUENCY_MINUTES=60" >> $GITHUB_ENV
        echo "CRYPTOSELECTARCHY=true" >> $GITHUB_ENV
        echo "VOTES_TO_APPROVE=3" >> $GITHUB_ENV
        echo "VOTES_TO_REJECT=3" >> $GITHUB_ENV

    # 5. Запуск всех тестов с покрытием (меряем пакет kartoshka/, не 7-строчный shim)
    - name: Run tests with coverage
      run: |
        pytest -v \
          --cov=kartoshka \
          --cov=kartoshka_bot \
          --cov-report=term-missing:skip-covered \
          --cov-report=xml \
          --cov-report=html

    # 6. Загружаем HTML‑отчёт как artefact
    - name: Upload HTML coverage report
      uses: actions/upload-artifact@v7
      with:
        name: coverage-html
        path: htmlcov/

    # 7. Создаём/обновляем coverage.svg
    #    coverage-badge@1.1.2 импортит pkg_resources → нужен setuptools<81.
    #    Раньше использовался tj-actions/coverage-badge-py@v2, но он сам апгрейдит
    #    setuptools до latest и ломает себя. Ставим руками.
    - name: Create coverage.svg badge
      id: badge
      run: |
        pip install 'setuptools<81' coverage-badge
        coverage-badge -o coverage.svg -f

    # 8. Коммитим и пушим бейдж, только если файл реально изменился
    - name: Commit and push badge
      if: github.ref == 'refs/heads/main'
      run: |
        if git diff --quiet coverage.svg; then
          echo "coverage.svg не изменился, пропускаем коммит"
          exit 0
        fi
        git config --local user.email "github-actions[bot]@users.noreply.github.com"
        git config --local user.name  "github-actions[bot]"
        git add coverage.svg
        git commit -m "chore: update coverage badge"
        git push
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    # 10. Вычисляем процент покрытия для комментария
    - name: Extract coverage %
      id: cov
      run: |
        python - <<'PY'
        import xml.etree.ElementTree as ET, math, os
        pct = math.floor(float(ET.parse('coverage.xml').getroot().attrib['line-rate'])*100)
        with open(os.environ['GITHUB_OUTPUT'], 'a') as fh:
            fh.write(f"pct={pct}\n")
        PY

    # 11. Комментарий в PR (sticky — обновляет, а не плодит)
    - name: PR comment with coverage
      if: github.event_name == 'pull_request'
      uses: marocchino/sticky-pull-request-comment@v3
      with:
        message: |
          🧪 **Test coverage:** **${{ steps.cov.outputs.pct }}%**
